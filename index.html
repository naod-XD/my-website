<!DOCTYPE html>
<html>
<head>
  <title>Werte Umrechner</title>

  <style>
    body{
      text-align:center;
      animation: gradient 20s ease-in-out infinite;
      background:linear-gradient(-45deg,#de788e,#f5d41d,#de788e,#43800a,black);
      background-size: 400% 400%;
      font-family:helvetica;
      color:white;
      height:100vh;
      margin:0;
      font-size:40px;
    }

    .box{
      background:linear-gradient(-45deg,#a3e3e3 ,#073636);
      border-radius:50px;
      height:300px;
      color:white;
      border:3px solid;
      width:600px;
      margin: auto;
      padding:10px;
      font-size:40px;
    }

    .buttons{
      height:100px;
      width:404px;
      border-radius:25px;
      margin:20px 10px 20px 10px;
      background-color:#37567a;
      color:white;
      transition: transform 0.05s ease;
      font-size: 40px;
    }

    .buttons:hover{
      background-color:#142140;
      transform:scale(0.9);
    }

    .buttons:active{
      background-color:#0e1126;
      transform:scale(1.3);
    }

    .input{
      border-radius:10px;
      text-align:center;
    }

    @keyframes gradient {
      0% { background-position: 100% 0%; }
      25%{ background-position: 100% 100%; }
      40%{ background-position: 0% 100%; }
      62%{ background-position:50% 50%; }
      75%{ background-position: 0% 0%; }
      100%{ background-position: 100% 0%; }
    }
  </style>

</head>
<body>

<h1 class="Head1">Werte Umrechner</h1>

<div class="box">

  <button class="buttons" id="buttonOne">Meter zu Zentimeter</button>
  <button class="buttons" id="buttonTwo">Zentimeter zu Meter</button>

  <br>

  <input type="number" id="input" placeholder="zahl hier eingeben" class="input">

  <p id="result">ergebnis</p>

</div>

<p class="finalLine">v1.1.2</p>

<script>
const ButtonOne = document.getElementById("buttonOne");
const ButtonTwo = document.getElementById("buttonTwo");
const result = document.getElementById("result");

const CmToM = 0.01;
const MToCm = 100;

// Button 1
ButtonOne.addEventListener("click", function() {
  let input = Number(document.getElementById("input").value);
  result.innerHTML = input * MToCm;
});

// Button 2
ButtonTwo.addEventListener("click", function() {
  let input = Number(document.getElementById("input").value);
  result.innerHTML = input * CmToM;
});
</script>

</body>
</html>
